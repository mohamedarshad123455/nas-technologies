<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Technologies | Premium Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --deep-blue: #1e3a8a; }
        .text-gold { color: var(--gold); }
        .bg-gold { background-color: var(--gold); }
        html { scroll-behavior: smooth; }
        
        /* Larger Circle for Social Media */
        .social-circle {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #D4AF37; /* Gold border */
            border-radius: 50%;
            transition: all 0.3s ease;
            font-size: 1.5rem;
        }
        .social-circle:hover {
            background-color: var(--gold);
            color: white !important;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans">

    <nav class="flex justify-between items-center px-6 md:px-10 py-5 sticky top-0 bg-white/95 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm">
        <div class="flex items-center">
            <img src="logo.png" alt="NAS Technologies Logo" class="h-20 md:h-24 w-auto"> </div>
        <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-bold">
            <a href="#home" class="hover:text-blue-700 transition">Home</a>
            <a href="#services" class="hover:text-blue-700 transition">Services</a>
            <a href="#team" class="hover:text-blue-700 transition">Team</a>

            </div>
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Benazir&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Benazir</h3>
                <p class="text-gold text-xs font-bold uppercase">CFO</p>
            </div>
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Tariq&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Tariq</h3>

            </div>
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Vadivelu&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Vadivelu</h3>
                <p class="text-gold text-xs font-bold uppercase">Senior Engineer Officer</p>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 px-6 bg-slate-50">
        <div class="max-w-4xl mx-auto bg-blue-900 p-10 rounded-3xl shadow-2xl text-white">
            <h2 class="text-2xl font-bold mb-8 text-center">Get a Fast Quote</h2>
            <form action="https://api.sheetbest.com/sheets/c9692ef9-e038-4b51-b040-e193176960ef" method="POST" class="grid md:grid-cols-2 gap-6">
                <input type="text" name="name" placeholder="Full Name" class="bg-blue-800 p-4 rounded-xl border border-blue-700 outline-none focus:border-gold text-white" required>
                <input type="email" name="email" placeholder="Email Address" class="bg-blue-800 p-4 rounded-xl border border-blue-700 outline-none focus:border-gold text-white" required>
                <input type="tel" name="phone" placeholder="Phone Number" class="bg-blue-800 p-4 rounded-xl border border-blue-700 outline-none focus:border-gold text-white md:col-span-2" required>
                <textarea name="message" placeholder="Describe your security needs..." class="bg-blue-800 p-4 rounded-xl border border-blue-700 h-32 md:col-span-2 outline-none focus:border-gold text-white"></textarea>
                <button type="submit" class="md:col-span-2 bg-gold py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-yellow-600 transition shadow-lg">Submit to Excel</button>
            </form>
        </div>
    </section>

    <footer class="py-16 bg-white border-t border-slate-100 text-center">
        <div class="flex justify-center space-x-8 mb-10">
            <a href="#" class="social-circle text-pink-600">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="social-circle text-blue-600">

            <a href="#" class="social-circle text-blue-800">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
        <img src="logo.png" alt="NAS Logo" class="h-16 mx-auto mb-4 opacity-50">
        <p class="text-slate-400 text-xs">&copy; 2026 NAS Technologies. Nelson Manikam Road, Chennai.</p>
    </footer>

</html>
