<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Technologies | Premium Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --deep-blue: #1e3a8a; }
        .text-gold { color: var(--gold); }
        .bg-gold { background-color: var(--gold); }
        html { scroll-behavior: smooth; }
        
        .social-circle {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            transition: all 0.3s ease;
            font-size: 1.5rem;
        }
        .social-circle:hover {
            background-color: var(--gold);
            color: white !important;
            transform: scale(1.1);
        }

        /* Success Pop-up Style */
        #success-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 2px solid #D4AF37;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans">

    <div id="overlay"></div>
    <div id="success-modal">
        <i class="fa-solid fa-circle-check text-5xl text-green-500 mb-4"></i>
        <h2 class="text-2xl font-bold text-blue-900 mb-2">Form Submitted Successfully!</h2>
        <p class="text-slate-600 mb-6">Our team will contact you shortly regarding your security needs.</p>
        <button onclick="closeModal()" class="bg-blue-900 text-white px-8 py-2 rounded-full font-bold hover:bg-blue-800 transition">Close</button>
    </div>

    <nav class="flex justify-between items-center px-6 md:px-10 py-5 sticky top-0 bg-white/95 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm">
        <div class="flex items-center">
            <img src="logo.png" alt="NAS Technologies Logo" class="h-20 md:h-24 w-auto">
        </div>
        <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-bold">
            <a href="#home" class="hover:text-blue-700 transition">Home</a>
            <a href="#services" class="hover:text-blue-700 transition">Services</a>
            <a href="#team" class="hover:text-blue-700 transition">Team</a>
            <a href="#contact" class="bg-blue-800 text-white px-6 py-2 rounded-full hover:bg-blue-900 transition text-xs">Get Quote</a>
        </div>
    </nav>

    <section id="home" class="py-20 flex flex-col justify-center items-center text-center px-6 bg-slate-50">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6 text-blue-900">Secure Your World with <br><span class="text-gold">AI Surveillance</span></h1>
        <a href="#contact" class="bg-gold text-white px-10 py-4 rounded-md font-bold hover:bg-yellow-600 shadow-lg transition">Request Audit</a>
    </section>

    <section id="team" class="py-24 px-6 bg-white">
        <div class="text-center mb-16">
            <h2 class="text-4xl font-bold text-blue-900">Our Leadership Team</h2>
            <div class="h-1.5 w-20 bg-gold mx-auto mt-4 rounded-full"></div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-6xl mx-auto">
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Shanaz&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Shanaz</h3>
                <p class="text-gold text-xs font-bold uppercase">CEO</p>
            </div>
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Benazir&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Benazir</h3>
                <p class="text-gold text-xs font-bold uppercase">CFO</p>
            </div>
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Tariq&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Tariq</h3>
                <p class="text-gold text-xs font-bold uppercase">CTO</p>
            </div>
            <div class="text-center">
                <div class="w-32 h-32 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-gold p-1 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Vadivelu&background=1e3a8a&color=fff" class="rounded-full">
                </div>
                <h3 class="font-bold text-lg">Vadivelu</h3>
                <p class="text-gold text-xs font-bold uppercase">Senior Engineer Officer</p>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 px-6 bg-slate-50">
        <div class="max-w-4xl mx-auto bg-blue-900 p-10 rounded-3xl shadow-2xl text-white">
            <h2 class="text-2xl font-bold mb-8 text-center">Get a Fast Quote</h2>
            <form id="quoteForm" class="grid md:grid-cols-2 gap-6">
                <input type="text" name="name" placeholder="Full Name" class="bg-blue-800 p-4 rounded-xl border border-blue-700 outline-none focus:border-gold text-white" required>
                <input type="email" name="email" placeholder="Email Address" class="bg-blue-800 p-4 rounded-xl border border-blue-700 outline-none focus:border-gold text-white" required>
                <input type="tel" name="phone" placeholder="Phone Number" class="bg-blue-800 p-4 rounded-xl border border-blue-700 outline-none focus:border-gold text-white md:col-span-2" required>
                <textarea name="message" placeholder="Describe your security needs..." class="bg-blue-800 p-4 rounded-xl border border-blue-700 h-32 md:col-span-2 outline-none focus:border-gold text-white"></textarea>
                <button type="submit" id="submitBtn" class="md:col-span-2 bg-gold py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-yellow-600 transition shadow-lg">Submit to Excel</button>
            </form>
        </div>
    </section>

    <footer class="py-16 bg-white border-t border-slate-100 text-center">
        <div class="flex justify-center space-x-8 mb-10">
            <a href="#" class="social-circle text-pink-600"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="social-circle text-blue-6
